
#############################################
# Level 7 — Star Road (SOLUTION)
#
# Refactor van monoliet naar leesbare delen:
# - Meerdere jobs met duidelijke verantwoordelijkheden
# - Gedeelde setup via composite action .github/actions/setup-java-gradle
# - Correcte permissies en conditionele push naar GHCR
# - A not ideal (but anyway) an example of Concurrency
#############################################
name: Level 7 - Star Road (Solution)

on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  LATEST: ghcr.io/${{ github.repository }}:latest
  JACOCO_XML: build/reports/jacoco/test/jacocoTestReport.xml

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup (JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Build
        run: ./gradlew build --scan --no-daemon

      - name: Tests + JaCoCo reports
        env:
          JACOCO_MINIMUM_COVERAGE: "0.60"
        run: ./gradlew test jacocoTestReport --stacktrace --no-daemon

      - name: Upload test reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/test-results/test
            build/reports/tests/test

      - name: Upload JaCoCo reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html

  artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup (JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Build JAR (zonder tests)
        run: ./gradlew bootJar -x test --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  image:
    name: Build & Push Image (alleen main)
    runs-on: ubuntu-latest
    needs: [build-test, artifact]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code (voor Dockerfile)
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: docker

      - name: List downloaded JARs (debug)
        run: |
          echo "Searching for JAR in artifact..."
          find docker -type f -name "*.jar" -print | sed -n '1,200p'

      - name: Login to GHCR (alleen op main)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image (Docker)
        run: |
          set -euo pipefail
          JAR_FILE=$(find docker -type f -name "*.jar" | head -n1 || true)
          if [ -z "${JAR_FILE}" ]; then
            echo "[ERROR] No JAR found in downloaded artifact. Contents:";
            ls -R docker || true; exit 1; fi
          echo "Using JAR: ${JAR_FILE}"
          # Normalize path/name so Dockerfile can COPY it without build args
          cp -f "${JAR_FILE}" docker/app.jar
          docker build \
            -t ${IMAGE} \
            -f docker/Dockerfile \
            docker

      - name: Push image (alleen op main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE}
          docker tag ${IMAGE} ${LATEST}
          docker push ${LATEST}
