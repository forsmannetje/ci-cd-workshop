#############################################
# Level 7 — Star Road (SOLUTION)
#
# Refactor van monoliet naar leesbare delen:
# - Meerdere jobs met duidelijke verantwoordelijkheden
# - Gedeelde setup via composite action .github/actions/setup-java-gradle
# - Correcte permissies en conditionele push naar GHCR
# - Caching en (optioneel) concurrency
#############################################
name: Level 7 - Star Road (Solution)

on:
  workflow_dispatch: {}
  # Voor productiegebruik kun je push/pull_request triggers toevoegen.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  LATEST: ghcr.io/${{ github.repository }}:latest
  JACOCO_XML: build/reports/jacoco/test/jacocoTestReport.xml
  THRESHOLD: "0.50" # 80% //TODO: put back to 0.80

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup (JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Build
        run: ./gradlew build --scan --no-daemon

      - name: Tests + JaCoCo reports
        run: ./gradlew test jacocoTestReport --stacktrace --no-daemon

      - name: Upload test reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/test-results/test
            build/reports/tests/test

      - name: Upload JaCoCo reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html

  quality-gate:
    name: Quality Gate (JaCoCo)
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - name: Download JaCoCo reports
        uses: actions/download-artifact@v4
        with:
          name: jacoco-reports
          path: .

      - name: List downloaded files (debug)
        run: |
          echo "Listing potential JaCoCo locations:"
          find . -type f \( -name "jacocoTestReport.xml" -o -path "./build/reports/jacoco/*" \) -print | sed -n '1,200p'

      - name: Enforce coverage threshold
        env:
          THRESHOLD: ${{ env.THRESHOLD }}
          REPORT_FILE: ${{ env.JACOCO_XML }}
        run: |
          set -euo pipefail
          # Resolve report path robustly across artifact extraction layouts
          if [ ! -f "$REPORT_FILE" ]; then
            alt="./jacoco-reports/${REPORT_FILE}"
            if [ -f "$alt" ]; then
              REPORT_FILE="$alt"
            else
              found=$(find . -type f -name jacocoTestReport.xml | head -n1 || true)
              if [ -n "${found}" ] && [ -f "${found}" ]; then
                REPORT_FILE="${found}"
              else
                echo "[ERROR] JaCoCo XML report niet gevonden op:"
                echo "  - $REPORT_FILE"
                echo "  - $alt"
                echo "Zocht naar 'jacocoTestReport.xml' onder: $(pwd)"
                find . -maxdepth 6 -type f -name jacocoTestReport.xml || true
                echo "Heb je de JaCoCo plugin en XML report geconfigureerd in Gradle? Zie level-3-README.md."
                exit 1
              fi
            fi
          fi
          line=$(grep -o '<counter type="LINE"[^>]*/>' "$REPORT_FILE" | tail -n1)
          if [ -z "$line" ]; then
            echo "[ERROR] Geen LINE coverage counter gevonden in $REPORT_FILE"
            exit 1
          fi
          missed=$(echo "$line" | sed -E 's/.*missed="([0-9]+)".*/\1/')
          covered=$(echo "$line" | sed -E 's/.*covered="([0-9]+)".*/\1/')
          total=$((missed + covered))
          echo "Missed=$missed Covered=$covered Total=$total"
          awk -v c="$covered" -v t="$total" -v thr="$THRESHOLD" 'BEGIN { \
            if (t==0) { print "[ERROR] Geen lijnen gemeten"; exit 1 } \
            cov=c/t; printf("Line coverage=%.2f%% (threshold %.0f%%)\n", cov*100, thr*100); \
            if (cov >= thr) exit 0; else exit 1 }'

      # Geen upload hier meer; de rapporten zijn al uit de vorige job geüpload

  artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup (JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Build JAR (zonder tests)
        run: ./gradlew bootJar -x test --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  image:
    name: Build & Push Image (alleen main)
    runs-on: ubuntu-latest
    needs: [artifact]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app-jar

      - name: List downloaded JARs (debug)
        run: |
          echo "Searching for JAR in artifact..."
          find app-jar -type f -name "*.jar" -print | sed -n '1,200p'

      - name: Login to GHCR (alleen op main)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pack CLI
        uses: buildpacks/pack-action@v5

      - name: Build container image from JAR (Paketo)
        env:
          BP_JVM_VERSION: "21.*"
        run: |
          # Ensure the bootable jar exists so the "executable-jar" buildpack path can be used
          ./gradlew bootJar -x test --no-daemon
          # Use a Java-capable Paketo builder explicitly to avoid detection issues
          ./gradlew bootBuildImage --imageName ${IMAGE} --builder paketobuildpacks/builder-jammy-base

      - name: Push image (alleen op main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE}
          docker tag ${IMAGE} ${LATEST}
          docker push ${LATEST}
