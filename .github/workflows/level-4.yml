#############################################
# Level 4 — Toad's Treasure House (STUB)
#
# Doel (verhaal):
#  Verzamel Toad's schatten: bouw een artifact en leg 'm veilig weg.
#
# Daadwerkelijk leerdoel:
# - Een build artifact (JAR) produceren
# - Dit artifact uploaden als GitHub Actions artifact
# - Build parameters gebruiken om de artifact naam te bepalen
#############################################
name: Level 4 - Toad's Treasure House

on:
  workflow_dispatch: {}

jobs:
  artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (maak de schat)
        run: ./gradlew build

